<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع الآمنة - GSM SHTOOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --btc-color: #f7931a;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .payment-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 90%; max-width: 450px; text-align: center;
            position: relative;
        }

        .payment-card::before {
            content: ''; position: absolute; top: -2px; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, transparent, var(--btc-color), transparent);
        }

        .btc-logo { width: 70px; filter: drop-shadow(0 0 10px var(--btc-color)); margin-bottom: 20px; }

        .qr-wrapper {
            background: white; padding: 15px; display: inline-block;
            border-radius: 20px; margin: 20px 0;
            box-shadow: 0 0 20px rgba(247, 147, 26, 0.2);
        }

        .address-box {
            background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 12px;
            font-family: monospace; font-size: 0.85rem; word-break: break-all;
            color: var(--btc-color); border: 1px solid rgba(247, 147, 26, 0.3);
            margin-bottom: 15px; cursor: pointer;
        }

        .btn-action {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; font-family: 'Cairo', sans-serif; cursor: pointer;
            transition: 0.3s; margin-bottom: 10px; font-size: 1rem;
        }

        .btn-copy { background: var(--btc-color); color: white; }
        .btn-confirm { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; }
        
        .timer { color: #ef4444; font-weight: bold; margin: 15px 0; font-size: 0.9rem; }
        .footer-nav a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="btc-header">
        <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" alt="BTC" class="btc-logo">
        <h2>تأكيد الدفع</h2>
        <p style="color: #94a3b8;">يرجى إرسال البتكوين للعنوان الموضح</p>
    </div>

    <div class="timer" id="timer">صلاحية العنوان تنتهي خلال: 15:00</div>

    <div class="qr-wrapper">
        <div id="qrcode"></div>
    </div>

    <div class="address-container" style="text-align: right;">
        <label style="font-size: 0.8rem; color: #94a3b8;">عنوان المحفظة:</label>
        <div class="address-box" id="btc-address" onclick="copyAddress()">
            bc1p3w4yfuyu52gdv296nqrs72mfaafkr5qu7u3xmamflrmql0sqvsmqvhazr9
        </div>
    </div>

    <button class="btn-action btn-copy" onclick="copyAddress()">
        <i class="far fa-copy"></i> نسخ العنوان
    </button>

    <button class="btn-action btn-confirm" onclick="confirmPayment()">
        لقد قمت بالتحويل بالفعل
    </button>

    <div class="footer-nav" style="margin-top: 20px;">
        <a href="index.html"><i class="fas fa-arrow-right"></i> إلغاء والعودة للرئيسية</a>
    </div>
</div>

<script type="module">
    // استيراد Firebase من ملفك المحلي
    import { db, collection, addDoc, serverTimestamp } from './firebase-config.js';
    import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const walletAddress = "bc1p3w4yfuyu52gdv296nqrs72mfaafkr5qu7u3xmamflrmql0sqvsmqvhazr9";

    // 1. توليد الباركود بمجرد تحميل الصفحة
    const qrcodeContainer = document.getElementById("qrcode");
    if(qrcodeContainer) {
        new QRCode(qrcodeContainer, {
            text: "bitcoin:" + walletAddress,
            width: 180, height: 180,
            colorDark : "#000000", colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    // 2. تعريف وظيفة النسخ (نربطها بـ window لتعمل مع onclick)
    window.copyAddress = function() {
        navigator.clipboard.writeText(walletAddress).then(() => {
            alert("✅ تم نسخ عنوان المحفظة بنجاح");
        });
    }

    // 3. تعريف وظيفة التأكيد والربط بـ Firebase
    window.confirmPayment = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId'); 

        try {
            if (orderId) {
                // تحديث حالة الطلب الموجود
                const orderRef = doc(db, "orders", orderId);
                await updateDoc(orderRef, {
                    status: "awaiting_confirmation",
                    paymentMethod: "BTC",
                    confirmedAt: serverTimestamp()
                });
            } else {
                // إنشاء سجل إشعار عام إذا لم يوجد orderId
                await addDoc(collection(db, "payment_notifications"), {
                    address: walletAddress,
                    status: "clicked_confirm",
                    timestamp: serverTimestamp()
                });
            }

            alert("⏳ تم إرسال إشعار الدفع. سيتم تفعيل الخدمة فور تأكيد الشبكة.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Firebase Error:", error);
            alert("حدث خطأ في الاتصال. يرجى المحاولة لاحقاً.");
        }
    }

    // 4. العداد التنازلي
    let time = 15 * 60;
    const timerElement = document.getElementById('timer');
    const countdown = setInterval(() => {
        let min = Math.floor(time / 60);
        let sec = time % 60;
        timerElement.innerHTML = `صلاحية العنوان تنتهي خلال: ${min}:${sec < 10 ? '0'+sec : sec}`;
        if (time <= 0) {
            clearInterval(countdown);
            timerElement.innerHTML = "انتهت صلاحية الجلسة";
        }
        time--;
    }, 1000);
</script>

</body>
</html>
