<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order - GSM SHTOOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --btc: #f7931a; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; padding: 20px; line-height: 1.6; }
        .glass-card { max-width: 750px; margin: 20px auto; padding: 35px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: #94a3b8; font-size: 0.9rem; font-weight: 600; }
        .premium-input { width: 100%; padding: 14px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; color: white; outline: none; transition: 0.3s; box-sizing: border-box; font-size: 1rem; cursor: pointer; }
        .premium-input:focus { border-color: var(--primary); }
        optgroup { background: #161b22; color: var(--primary); font-style: normal; font-weight: bold; }
        option { background: #0a0a0a; color: white; }
        
        .btc-section { background: rgba(247, 147, 26, 0.05); border: 1px solid rgba(247, 147, 26, 0.3); padding: 20px; border-radius: 15px; margin-top: 25px; }
        .btc-address-container { background: #000; padding: 12px; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .btc-address { font-family: monospace; color: var(--btc); font-size: 0.8rem; word-break: break-all; }
        .copy-btn { background: var(--btc); color: black; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; flex-shrink: 0; margin-left: 10px; }

        .price-badge { background: rgba(34, 197, 94, 0.15); color: var(--success); padding: 5px 15px; border-radius: 20px; font-weight: 900; float: right; font-size: 0.9rem; }
        .buy-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .buy-btn:hover { background: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="glass-card">
    <h2 style="text-align: center; color: var(--primary); margin-bottom: 30px;"><i class="fas fa-shopping-cart"></i> OFFICIAL ORDER FORM</h2>
    
    <form id="orderForm" onsubmit="handleOrder(event)">
        <div class="input-group">
            <label>Select Device & Service <span id="priceDisplay" class="price-badge">Price: $0</span></label>
            <select id="serviceSelect" class="premium-input" onchange="updateUI()" required>
                <option value="" disabled selected>--- Choose Model ---</option>
                
                <optgroup label="iPhone Series">
                    <option value="25" data-name="iPhone 6/6P/6s/6sP">iPhone 6 / 6 Plus / 6s / 6s Plus - $25</option>
                    <option value="30" data-name="iPhone SE">iPhone SE - $30</option>
                    <option value="30" data-name="iPhone 7/7P">iPhone 7 / 7 Plus - $30</option>
                    <option value="35" data-name="iPhone 8/8P">iPhone 8 / 8 Plus - $35</option>
                    <option value="35" data-name="iPhone X">iPhone X - $35</option>
                    <option value="40" data-name="iPhone XR/XS">iPhone XR / XS - $40</option>
                    <option value="45" data-name="iPhone XS Max">iPhone XS Max - $45</option>
                    <option value="45" data-name="iPhone 11">iPhone 11 - $45</option>
                    <option value="55" data-name="iPhone 11 Pro">iPhone 11 Pro - $55</option>
                    <option value="75" data-name="iPhone 11 Pro Max">iPhone 11 Pro Max - $75</option>
                    <option value="90" data-name="iPhone 12/12 mini">iPhone 12 / 12 mini - $90</option>
                    <option value="95" data-name="iPhone 12 Pro">iPhone 12 Pro - $95</option>
                    <option value="100" data-name="iPhone 12 Pro Max">iPhone 12 Pro Max - $100</option>
                    <option value="115" data-name="iPhone 13">iPhone 13 - $115</option>
                    <option value="120" data-name="iPhone 13 mini">iPhone 13 mini - $120</option>
                    <option value="135" data-name="iPhone 13 Pro">iPhone 13 Pro - $135</option>
                    <option value="150" data-name="iPhone 13 Pro Max">iPhone 13 Pro Max - $150</option>
                    <option value="160" data-name="iPhone 14/14 Plus">iPhone 14 / 14 Plus - $160</option>
                    <option value="165" data-name="iPhone 14 Pro">iPhone 14 Pro - $165</option>
                    <option value="175" data-name="iPhone 14 Pro Max">iPhone 14 Pro Max - $175</option>
                    <option value="165" data-name="iPhone 15">iPhone 15 - $165</option>
                    <option value="175" data-name="iPhone 15 Plus">iPhone 15 Plus - $175</option>
                    <option value="180" data-name="iPhone 15 Pro">iPhone 15 Pro - $180</option>
                    <option value="190" data-name="iPhone 15 Pro Max">iPhone 15 Pro Max - $190</option>
                    <option value="190" data-name="iPhone 16">iPhone 16 - $190</option>
                    <option value="195" data-name="iPhone 16 Plus">iPhone 16 Plus - $195</option>
                    <option value="195" data-name="iPhone 16 Pro">iPhone 16 Pro - $195</option>
                    <option value="205" data-name="iPhone 16 Pro Max">iPhone 16 Pro Max - $205</option>
                    <option value="195" data-name="iPhone 16e">iPhone 16e - $195</option>
                    <option value="195" data-name="iPhone 17">iPhone 17 - $195</option>
                    <option value="200" data-name="iPhone 17 Pro">iPhone 17 Pro - $200</option>
                    <option value="210" data-name="iPhone 17 Pro Max">iPhone 17 Pro Max - $210</option>
                    <option value="200" data-name="iPhone 17 Air">iPhone 17 Air - $200</option>
                </optgroup>

                <optgroup label="iPad Series">
                    <option value="50" data-name="iPad 8">iPad 8 - $50</option>
                    <option value="55" data-name="iPad 9">iPad 9 - $55</option>
                    <option value="65" data-name="iPad 10">iPad 10 - $65</option>
                    <option value="80" data-name="iPad Air 4">iPad Air 4 - $80</option>
                    <option value="85" data-name="iPad Air 5">iPad Air 5 - $85</option>
                    <option value="140" data-name="iPad Pro 9.7/10.5">iPad Pro 9.7 / 10.5 - $140</option>
                    <option value="140" data-name="iPad Pro 11 (1-4)">iPad Pro 11 (Gen 1-4) - $140</option>
                    <option value="150" data-name="iPad Pro 12.9 (1-6)">iPad Pro 12.9 (Gen 1-6) - $150</option>
                </optgroup>

                <optgroup label="Apple Watch">
                    <option value="55" data-name="Watch Series 4">Watch Series 4 - $55</option>
                    <option value="60" data-name="Watch Series 5">Watch Series 5 - $60</option>
                    <option value="60" data-name="Watch Series 6">Watch Series 6 - $60</option>
                    <option value="70" data-name="Watch Series 7">Watch Series 7 - $70</option>
                    <option value="80" data-name="Watch Series 8">Watch Series 8 - $80</option>
                    <option value="80" data-name="Watch Series 9">Watch Series 9 - $80</option>
                    <option value="100" data-name="Watch Series 10/11">Watch Series 10 / 11 - $100</option>
                    <option value="120" data-name="Watch Ultra 1">Watch Ultra 1 - $120</option>
                    <option value="130" data-name="Watch Ultra 2">Watch Ultra 2 - $130</option>
                    <option value="130" data-name="Watch Ultra 3">Watch Ultra 3 - $130</option>
                </optgroup>
                
                <optgroup label="Android Services">
                    <option value="15" data-name="Android FRP Bypass">FRP Bypass (All Brands) - $15</option>
                </optgroup>
            </select>
        </div>

        <div class="input-group">
            <label>Device IMEI / Serial Number (SN)</label>
            <input type="text" id="imeiInput" class="premium-input" placeholder="Enter IMEI or SN" required>
        </div>

        <div class="btc-section">
            <p style="margin: 0; font-weight: bold; font-size: 0.9rem; color: var(--btc);"><i class="fab fa-bitcoin"></i> Bitcoin Wallet Address</p>
            <div class="btc-address-container">
                <span class="btc-address" id="btcAddress">Bc1p3w4yfuyu52gdv296nqrs72mfaafkr5qu7u3xmamflrmql0sqvsmqvhazr9</span>
                <button type="button" class="copy-btn" onclick="copyBTC()">COPY</button>
            </div>
        </div>

        <button type="submit" class="buy-btn">SUBMIT TO TELEGRAM @gsmshtool <i class="fab fa-telegram-plane"></i></button>
    </form>
</div>

<script>
    function updateUI() {
        const select = document.getElementById('serviceSelect');
        document.getElementById('priceDisplay').innerText = `Price: $${select.value}`;
    }

    function copyBTC() {
        const addr = document.getElementById('btcAddress').innerText;
        navigator.clipboard.writeText(addr).then(() => { alert("BTC Address Copied!"); });
    }

    function handleOrder(e) {
        e.preventDefault();
        const select = document.getElementById('serviceSelect');
        const model = select.options[select.selectedIndex].getAttribute('data-name');
        const price = select.value;
        const imei = document.getElementById('imeiInput').value;

        const message = `🚀 *NEW ORDER*\n\n📦 *Model:* ${model}\n💰 *Price:* $${price}\n🆔 *SN/IMEI:* ${imei}\n💳 *Payment:* Bitcoin\n\n_Waiting for receipt..._`;
        window.location.href = `https://t.me/gsmshtool?text=${encodeURIComponent(message)}`;
    }
</script>
</body>
</html>
