<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order - GSM SHTOOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; padding: 20px; }
        .glass-card { max-width: 650px; margin: 40px auto; padding: 35px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: #94a3b8; font-size: 0.9rem; }
        .premium-input { width: 100%; padding: 14px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; color: white; outline: none; transition: 0.3s; box-sizing: border-box; }
        .premium-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(59,130,246,0.3); }
        .buy-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .buy-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
        .price-badge { background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 5px 15px; border-radius: 20px; font-weight: bold; float: right; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2 style="text-align: center; color: var(--primary);"><i class="fas fa-shopping-cart"></i> Submit Order</h2>
    
    <form id="orderForm" onsubmit="handleOrder(event)">
        <div class="input-group">
            <label>Select Device & Service <span id="priceDisplay" class="price-badge">Price: $0</span></label>
            <select id="serviceSelect" class="premium-input" onchange="updateUI()" required>
                <option value="" disabled selected>Click to choose model...</option>
                <optgroup label="iPhone Models">
                    <option value="25" data-name="iPhone 6/6S Series">iPhone 6 / 6S Series - $25</option>
                    <option value="35" data-name="iPhone 8/X">iPhone 8 / 8 Plus / X - $35</option>
                    <option value="75" data-name="iPhone 11 Pro Max">iPhone 11 Pro Max - $75</option>
                    <option value="150" data-name="iPhone 13 Pro Max">iPhone 13 Pro Max - $150</option>
                    <option value="190" data-name="iPhone 15 Pro Max / 16">iPhone 15 Pro Max / 16 - $190</option>
                </optgroup>
                <optgroup label="General Services">
                    <option value="15" data-name="FRP Bypass (All Android)">Android FRP Bypass - $15</option>
                </optgroup>
            </select>
        </div>

        <div class="input-group">
            <label>Device IMEI / Serial Number (Required)</label>
            <input type="text" id="imeiInput" class="premium-input" placeholder="Enter SN or IMEI" required>
        </div>

        <div style="background: rgba(59,130,246,0.05); border: 1px dashed var(--primary); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 25px;">
            <p style="font-size: 0.85rem; margin: 0; color: #888;">After clicking below, send the <strong>Payment Receipt</strong> screenshot to @gsmshtool on Telegram for activation.</p>
        </div>

        <button type="submit" class="buy-btn">Submit Order to Telegram <i class="fab fa-telegram-plane"></i></button>
    </form>
</div>

<script>
    function updateUI() {
        const select = document.getElementById('serviceSelect');
        const price = select.value;
        document.getElementById('priceDisplay').innerText = `Price: $${price}`;
    }

    function handleOrder(e) {
        e.preventDefault();
        const select = document.getElementById('serviceSelect');
        const model = select.options[select.selectedIndex].getAttribute('data-name');
        const price = select.value;
        const imei = document.getElementById('imeiInput').value;

        const message = `🚀 NEW ORDER\n--------------\n📦 Model: ${model}\n💰 Price: $${price}\n🆔 SN/IMEI: ${imei}\n--------------\nWaiting for receipt...`;
        
        // التوجيه المباشر لحسابك الشخصي
        window.location.href = `https://t.me/gsmshtool?text=${encodeURIComponent(message)}`;
    }
</script>

</body>
</html>
