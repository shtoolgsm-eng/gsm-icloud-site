<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order | GSM SHTOOL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #00d2ff; --s: #9d50bb; --bg: #050507; --card: #0f111a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        
        .order-card { 
            background: var(--card); 
            border: 1px solid #1f2235; 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { color: var(--p); margin-top: 0; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-top: 15px; font-size: 13px; color: #888; margin-left: 5px; }

        input, select { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            background: #161b22; 
            border: 1px solid #30363d; 
            color: white; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--p); box-shadow: 0 0 8px rgba(0,210,255,0.2); }

        .btn-submit { 
            background: linear-gradient(45deg, var(--p), var(--s)); 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 25px; 
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #555; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .back-link:hover { color: var(--p); }

        optgroup { background: #0f111a; color: var(--p); font-style: normal; }
        option { background: #161b22; color: white; }
    </style>
</head>
<body>

    <div class="order-card">
        <h2><i class="fas fa-shopping-cart"></i> New Order</h2>
        
        <label>Customer Name</label>
        <input type="text" id="name" placeholder="Enter your full name">

        <label>Device IMEI / Serial Number</label>
        <input type="text" id="device" placeholder="Ex: 3567XXXXXXXXXXX">

        <label>Select Service & Model</label>
        <select id="service">
            <optgroup label="iPhone Official Unlock">
                <option value="iPhone 6 ($25)">iPhone 6 ($25)</option>
                <option value="iPhone 6 Plus ($25)">iPhone 6 Plus ($25)</option>
                <option value="iPhone 6s ($25)">iPhone 6s ($25)</option>
                <option value="iPhone 6s Plus ($25)">iPhone 6s Plus ($25)</option>
                <option value="iPhone SE ($30)">iPhone SE ($30)</option>
                <option value="iPhone 7 ($30)">iPhone 7 ($30)</option>
                <option value="iPhone 7 Plus ($30)">iPhone 7 Plus ($30)</option>
                <option value="iPhone 8 ($35)">iPhone 8 ($35)</option>
                <option value="iPhone 8 Plus ($35)">iPhone 8 Plus ($35)</option>
                <option value="iPhone X ($35)">iPhone X ($35)</option>
                <option value="iPhone XR ($40)">iPhone XR ($40)</option>
                <option value="iPhone XS ($40)">iPhone XS ($40)</option>
                <option value="iPhone XS Max ($45)">iPhone XS Max ($45)</option>
                <option value="iPhone 11 ($45)">iPhone 11 ($45)</option>
                <option value="iPhone 11 Pro ($55)">iPhone 11 Pro ($55)</option>
                <option value="iPhone 11 Pro Max ($75)">iPhone 11 Pro Max ($75)</option>
                <option value="iPhone 12 ($90)">iPhone 12 ($90)</option>
                <option value="iPhone 12 mini ($90)">iPhone 12 mini ($90)</option>
                <option value="iPhone 12 Pro ($95)">iPhone 12 Pro ($95)</option>
                <option value="iPhone 12 Pro Max ($100)">iPhone 12 Pro Max ($100)</option>
                <option value="iPhone 13 ($115)">iPhone 13 ($115)</option>
                <option value="iPhone 13 mini ($120)">iPhone 13 mini ($120)</option>
                <option value="iPhone 13 Pro ($135)">iPhone 13 Pro ($135)</option>
                <option value="iPhone 13 Pro Max ($150)">iPhone 13 Pro Max ($150)</option>
                <option value="iPhone 14 ($160)">iPhone 14 ($160)</option>
                <option value="iPhone 14 Plus ($160)">iPhone 14 Plus ($160)</option>
                <option value="iPhone 14 Pro ($165)">iPhone 14 Pro ($165)</option>
                <option value="iPhone 14 Pro Max ($175)">iPhone 14 Pro Max ($175)</option>
                <option value="iPhone 15 ($165)">iPhone 15 ($165)</option>
                <option value="iPhone 15 Plus ($175)">iPhone 15 Plus ($175)</option>
                <option value="iPhone 15 Pro ($180)">iPhone 15 Pro ($180)</option>
                <option value="iPhone 15 Pro Max ($190)">iPhone 15 Pro Max ($190)</option>
                <option value="iPhone 16 ($190)">iPhone 16 ($190)</option>
                <option value="iPhone 16 Plus ($195)">iPhone 16 Plus ($195)</option>
                <option value="iPhone 16 Pro ($195)">iPhone 16 Pro ($195)</option>
                <option value="iPhone 16 Pro Max ($205)">iPhone 16 Pro Max ($205)</option>
                <option value="iPhone 16e ($195)">iPhone 16e ($195)</option>
                <option value="iPhone 17 ($195)">iPhone 17 ($195)</option>
                <option value="iPhone 17 Pro ($200)">iPhone 17 Pro ($200)</option>
                <option value="iPhone 17 Pro Max ($210)">iPhone 17 Pro Max ($210)</option>
                <option value="iPhone 17 Air ($200)">iPhone 17 Air ($200)</option>
            </optgroup>
            <optgroup label="iPad Models">
                <option value="iPad 8 ($50)">iPad 8 ($50)</option>
                <option value="iPad 9 ($55)">iPad 9 ($55)</option>
                <option value="iPad 10 ($65)">iPad 10 ($65)</option>
                <option value="Air 4 ($80)">Air 4 ($80)</option>
                <option value="Air 5 ($85)">Air 5 ($85)</option>
                <option value="iPad Pro Series ($140+)">iPad Pro Series ($140+)</option>
            </optgroup>
            <optgroup label="Apple Watch">
                <option value="Watch Series 4-9 ($50+)">Watch Series 4-9 ($50+)</option>
                <option value="Watch Ultra 1/2/3 ($110+)">Watch Ultra 1/2/3 ($110+)</option>
            </optgroup>
        </select>

        <button class="btn-submit" onclick="sendOrder()">Submit Order</button>
        
        <a href="index.html" class="back-link">← Return to Price List</a>
    </div>

    <script>
        function sendOrder() {
            const name = document.getElementById("name").value;
            const device = document.getElementById("device").value;
            const service = document.getElementById("service").value;

            if (!name || !device) {
                alert("❌ Please fill in your name and IMEI!");
                return;
            }

            // توليد رقم طلب عشوائي
            const orderId = "GSM-" + Math.floor(Math.random() * 90000 + 10000);

            // حفظ بيانات الطلب في الـ LocalStorage ليتم قراءتها في صفحة المعالجة والتتبع
            const orderData = {
                id: orderId,
                customer: name,
                device: device,
                service: service,
                status: "Processing 🔄"
            };

            localStorage.setItem("currentOrder", JSON.stringify(orderData));

            // توجيه المستخدم لصفحة المعالجة
            window.location.href = "processing.html";
        }
    </script>
</body>
</html>
