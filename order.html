<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Order | GSM SHTOOL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00d2ff; --s: #9d50bb; --bg: #030305; --card: #0f111a; --neon: #00ff88; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .order-container { max-width: 650px; margin: auto; background: var(--card); padding: 35px; border-radius: 25px; border: 1px solid #1f2235; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { color: var(--p); text-align: center; margin-bottom: 25px; letter-spacing: 1px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; }
        .input-field { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 14px; outline: none; box-sizing: border-box; }
        select.input-field { appearance: auto; }
        optgroup { background: #0f111a; color: var(--p); font-style: normal; }
        option { background: #000; color: #fff; }
        .btn-submit { width: 100%; padding: 16px; border-radius: 50px; border: none; background: linear-gradient(45deg, var(--p), var(--s)); color: #fff; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,210,255,0.3); }
        .payment-info { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border: 1px solid #1f2235; margin-top: 25px; }
        .wallet-item { background: #000; padding: 12px; border-radius: 8px; border: 1px solid #333; font-family: monospace; font-size: 11px; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>

<div class="order-container">
    <h2><i class="fas fa-cart-plus"></i> Submit New Order</h2>
    
    <div class="form-group">
        <label>Customer Full Name</label>

    </div>

    <div class="form-group">

                <option>iPhone 8 / 8 Plus - $35</option>
                <option>iPhone X - $35</option>
                <option>iPhone XR / XS - $40</option>
                <option>iPhone XS Max - $45</option>
                <option>iPhone 11 - $45</option>
                <option>iPhone 11 Pro - $55</option>
                <option>iPhone 11 Pro Max - $75</option>
                <option>iPhone 12 / 12 mini - $90</option>
                <option>iPhone 12 Pro - $95</option>
                <option>iPhone 12 Pro Max - $100</option>
                <option>iPhone 13 / 13 mini - $115</option>
                <option>iPhone 13 Pro - $135</option>
                <option>iPhone 13 Pro Max - $150</option>
                <option>iPhone 14 / 14 Plus - $160</option>
                <option>iPhone 14 Pro - $165</option>
                <option>iPhone 14 Pro Max - $175</option>
                <option>iPhone 15 - $165</option>
                <option>iPhone 15 Plus - $175</option>
                <option>iPhone 15 Pro - $180</option>
                <option>iPhone 15 Pro Max - $190</option>
                <option>iPhone 16 / 16e / 16 Plus - $190-$195</option>
                <option>iPhone 16 Pro - $195</option>
                <option>iPhone 16 Pro Max - $205</option>
                <option>iPhone 17 / 17 Air - $195-$200</option>
                <option>iPhone 17 Pro - $200</option>
                <option>iPhone 17 Pro Max - $210</option>
            </optgroup>
            <optgroup label="iPad Series">
                <option>iPad 8 - $50</option>
                <option>iPad 9 - $55</option>
                <option>iPad 10 - $65</option>
                <option>iPad Air 4 - $80</option>
                <option>iPad Air 5 - $85</option>
                <option>iPad Pro 9.7 / 10.5 - $140</option>
                <option>iPad Pro 11 (Gen 1-4) - $140</option>
                <option>iPad Pro 12.9 (Gen 1-6) - $150</option>
            </optgroup>
            <optgroup label="Apple Watch">
                <option>Series 4 / 5 / 6 - Contact Admin</option>
                <option>Series 7 / 8 / 9 - Contact Admin</option>
                <option>Series 10 / 11 - Contact Admin</option>
                <option>Ultra 1 / 2 / 3 - Contact Admin</option>
            </optgroup>
        </select>
    </div>

    <div class="form-group">
        <label>Payment Screenshot</label>
        <input type="file" class="input-field" style="padding: 10px;">
    </div>

    <button class="btn-submit" onclick="alert('Order submitted! Send your receipt to @gsmshtool on Telegram.')">Confirm & Submit</button>

    <div class="payment-info">
        <h4 style="margin:0; color: var(--p); font-size: 14px;"><i class="fas fa-wallet"></i> Payment Methods</h4>
        <div class="wallet-item">
            <span style="color: #f7931a;"><i class="fab fa-bitcoin"></i> BTC:</span><br>
            bc1p3w4yfuyu52gdv296nqrs72mfaafkr5qu7u3xmamflrmql0sqvsmqvhazr9
        </div>
        <div class="wallet-item">
            <span style="color: #26a17b;"><i class="fas fa-dollar-sign"></i> USDT (ERC20/BEP20):</span><br>
            0x77Ba12EeB09C2006ad2C0BF893557070194D7ec2
        </div>
    </div>
</div>

<div style="text-align: center; margin-top: 25px;">
    <a href="index.html" style="color: #555; text-decoration: none; font-size: 12px;">← Return to Homepage</a>
</div>

</body>
</html>
