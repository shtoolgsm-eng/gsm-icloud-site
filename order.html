<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iRemove VIP | Place Official Order</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #00d2ff; --gold: #ffd700; --bg: #050508; --card: #10121b; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; padding: 40px 5%; }
        .order-container { max-width: 600px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #222; }
        select, input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .price-tag { font-size: 24px; color: var(--gold); text-align: center; margin: 20px 0; font-weight: bold; }
        .payment-box { background: rgba(0,210,255,0.05); border: 1px dashed var(--p); padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
        .btn-order { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(45deg, #9d50bb, #6e48aa); color: #fff; font-weight: bold; cursor: pointer; }
        .copy-btn { font-size: 10px; background: #333; padding: 5px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="order-container">
    <h2 style="text-align:center; font-family: 'Orbitron';">OFFICIAL ORDER</h2>
    
    <label>Select Device Model:</label>
    <select id="deviceSelect" onchange="updatePrice()">
        <option value="0" data-price="0">-- Choose Model --</option>
        <optgroup label="iPhone Series">
            <option value="ip6" data-price="25">iPhone 6 / 6 Plus</option>
            <option value="ip11pm" data-price="75">iPhone 11 Pro Max</option>
            <option value="ip15pm" data-price="190">iPhone 15 Pro Max</option>
            <option value="ip16pm" data-price="205">iPhone 16 Pro Max</option>
            <option value="ip17pm" data-price="210">iPhone 17 Pro Max</option>
        </optgroup>
        <optgroup label="iPad Series">
            <option value="ipad10" data-price="65">iPad 10th Gen</option>
            <option value="iprad11" data-price="140">iPad Pro 11 (1-4)</option>
        </optgroup>
    </select>

    <input type="text" id="serialNumber" placeholder="Enter IMEI or Serial Number (Required)" required>

    <div class="price-tag">Total: $<span id="displayPrice">0</span></div>

    <div id="paymentArea" class="payment-box">
        <p style="font-size:12px; color:var(--p);"><i class="fas fa-wallet"></i> Send USDT (TRC20/ERC20) to:</p>
        <code style="font-size:11px; word-break: break-all;">0x77Ba12EeB09C2006ad2C0BF893557070194D7ec2</code>
        <span class="copy-btn" onclick="copyAddress()">COPY</span>
        <p style="font-size:10px; margin-top:10px;">* Take a screenshot after payment and send it to @gsmshtool</p>
    </div>

    <button class="btn-order" onclick="submitOrder()">SUBMIT ORDER & PAY</button>
</div>

<script>
    function updatePrice() {
        const select = document.getElementById('deviceSelect');
        const price = select.options[select.selectedIndex].getAttribute('data-price');
        document.getElementById('displayPrice').innerText = price;
        if(price > 0) document.getElementById('paymentArea').style.display = 'block';
    }

    function copyAddress() {
        navigator.clipboard.writeText("0x77Ba12EeB09C2006ad2C0BF893557070194D7ec2");
        alert("Address Copied!");
    }

    function submitOrder() {
        const sn = document.getElementById('serialNumber').value;
        if(sn.length < 5) { alert("Please enter a valid Serial Number"); return; }
        
        // إعادة توجيه المستخدم مباشرة للدعم الفني مع تفاصيل الطلب
        const model = document.getElementById('deviceSelect').options[document.getElementById('deviceSelect').selectedIndex].text;
        const price = document.getElementById('displayPrice').innerText;
        const message = `New Order: ${model}%0AIMEI/SN: ${sn}%0APrice: $${price}%0AStatus: Payment Pending`;
        window.location.href = `https://t.me/gsmshtool?text=${message}`;
    }
</script>

</body>
</html>
