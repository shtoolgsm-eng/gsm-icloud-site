<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقديم طلب - GSM SHTOOL</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card glass-card">
            <h2>إدخال بيانات الجهاز</h2>
            <form id="orderForm" onsubmit="event.preventDefault(); goToCheckout();">
                <div class="input-group">
                    <label>اختر موديل الجهاز والخدمة</label>
                    <select id="serviceSelect" class="premium-input" onchange="updatePrice()" required>
                        <option value="" disabled selected>اختر موديل جهازك</option>
                        <optgroup label="iPhone Models">
                            <option value="25" data-name="iPhone 6 / 6 Plus / 6s / 6s Plus">iPhone 6 / 6 Plus / 6s / 6s Plus - $25</option>
                            <option value="30" data-name="iPhone SE / 7 / 7 Plus">iPhone SE / 7 / 7 Plus - $30</option>
                            <option value="35" data-name="iPhone 8 / 8 Plus / X">iPhone 8 / 8 Plus / X - $35</option>
                            <option value="40" data-name="iPhone XR / XS">iPhone XR / XS - $40</option>
                            <option value="45" data-name="iPhone XS Max / 11">iPhone XS Max / 11 - $45</option>
                            <option value="55" data-name="iPhone 11 Pro">iPhone 11 Pro - $55</option>
                            <option value="75" data-name="iPhone 11 Pro Max">iPhone 11 Pro Max - $75</option>
                            <option value="90" data-name="iPhone 12 / 12 mini">iPhone 12 / 12 mini - $90</option>
                            <option value="95" data-name="iPhone 12 Pro">iPhone 12 Pro - $95</option>
                            <option value="100" data-name="iPhone 12 Pro Max">iPhone 12 Pro Max - $100</option>
                            <option value="115" data-name="iPhone 13">iPhone 13 - $115</option>
                            <option value="120" data-name="iPhone 13 mini">iPhone 13 mini - $120</option>
                            <option value="135" data-name="iPhone 13 Pro">iPhone 13 Pro - $135</option>
                            <option value="150" data-name="iPhone 13 Pro Max">iPhone 13 Pro Max - $150</option>
                            <option value="160" data-name="iPhone 14 / 14 Plus">iPhone 14 / 14 Plus - $160</option>
                            <option value="165" data-name="iPhone 14 Pro / 15">iPhone 14 Pro / 15 - $165</option>
                            <option value="175" data-name="iPhone 14 Pro Max / 15 Plus">iPhone 14 Pro Max / 15 Plus - $175</option>
                            <option value="180" data-name="iPhone 15 Pro">iPhone 15 Pro - $180</option>
                            <option value="190" data-name="iPhone 15 Pro Max / 16">iPhone 15 Pro Max / 16 - $190</option>
                            <option value="195" data-name="iPhone 16 / 16 Pro / 16e">iPhone 16 / 16 Pro / 16e - $195</option>
                            <option value="205" data-name="iPhone 16 Pro Max">iPhone 16 Pro Max - $205</option>
                            <option value="195" data-name="iPhone 17 / 17 Pro">iPhone 17 / 17 Pro - $195</option>
                            <option value="210" data-name="iPhone 17 Pro Max">iPhone 17 Pro Max - $210</option>
                            <option value="200" data-name="iPhone 17 Air / Pro">iPhone 17 Air / Pro - $200</option>
                        </optgroup>
                        <optgroup label="iPad Models">
                            <option value="50" data-name="iPad 8">iPad 8 - $50</option>
                            <option value="55" data-name="iPad 9">iPad 9 - $55</option>
                            <option value="65" data-name="iPad 10">iPad 10 - $65</option>
                            <option value="80" data-name="iPad Air 4">iPad Air 4 - $80</option>
                            <option value="85" data-name="iPad Air 5">iPad Air 5 - $85</option>
                            <option value="140" data-name="iPad Pro 9.7 / 10.5 / Pro 11">iPad Pro All Sizes (9.7-11") - $140</option>
                            <option value="150" data-name="iPad Pro 12.9 (1-6 Gen)">iPad Pro 12.9" All Gens - $150</option>
                        </optgroup>
                        <optgroup label="Apple Watch Models">
                            <option value="60" data-name="Watch Series 4 / 5 / 6">Watch Series 4 / 5 / 6 - $60</option>
                            <option value="75" data-name="Watch Series 7 / 8">Watch Series 7 / 8 - $75</option>
                            <option value="80" data-name="Watch Series 9">Watch Series 9 - $80</option>
                            <option value="90" data-name="Watch Series 10 / 11">Watch Series 10 / 11 - $90</option>
                            <option value="100" data-name="Watch Ultra 1">Watch Ultra 1 - $100</option>
                            <option value="120" data-name="Watch Ultra 2">Watch Ultra 2 - $120</option>
                            <option value="140" data-name="Watch Ultra 3">Watch Ultra 3 - $140</option>
                        </optgroup>
                    </select>
                </div>
                <div class="input-group">
                    <label>IMEI / Serial Number</label>
                    <input type="text" placeholder="أدخل الرقم هنا" required>
                </div>
                <button type="submit" class="btn-premium btn-primary">المتابعة للدفع</button>
            </form>
        </div>
    </div>
    <script>
        function updatePrice() {
            const select = document.getElementById('serviceSelect');
            const selectedOption = select.options[select.selectedIndex];
            if (selectedOption.value) {
                localStorage.setItem('selectedPrice', selectedOption.value);
                localStorage.setItem('selectedServiceName', selectedOption.getAttribute('data-name'));
            }
        }
        function goToCheckout() {
            updatePrice();
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
