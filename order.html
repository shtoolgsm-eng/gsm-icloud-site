<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقديم طلب - GSM SHTOOL</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card glass-card">
            <h2>إدخال بيانات الجهاز</h2>
            <form action="checkout.html">
                <div class="input-group">
                    <label>نوع الخدمة</label>
                    <select required>
                        <option>فتح iCloud رسمي (75$)</option>
                        <option>تخطي قفل MDM (30$)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>IMEI / Serial Number</label>
                    <input type="text" placeholder="أدخل الرقم هنا" required>
                </div>
                <button type="submit" class="btn btn-primary">المتابعة للدفع</button>
            </form>
        </div>
    </div>
</body>
</html>
