<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Product Catalog</h1>
    <h2>iPhone</h2>
    <table>
        <tr><th>Product</th><th>Price</th></tr>
        <tr><td>iPhone 14</td><td>$799</td></tr>
        <tr><td>iPhone 14 Pro</td><td>$999</td></tr>
        <tr><td>iPhone 14 Pro Max</td><td>$1,099</td></tr>
    </table>
    <h2>iPad</h2>
    <table>
        <tr><th>Product</th><th>Price</th></tr>
        <tr><td>iPad Air</td><td>$599</td></tr>
        <tr><td>iPad Pro 11</td><td>$799</td></tr>
        <tr><td>iPad Pro 12.9</td><td>$1,099</td></tr>
    </table>
    <h2>Apple Watch</h2>
    <table>
        <tr><th>Product</th><th>Price</th></tr>
        <tr><td>Apple Watch Series 7</td><td>$399</td></tr>
        <tr><td>Apple Watch SE</td><td>$279</td></tr>
        <tr><td>Apple Watch Ultra</td><td>$799</td></tr>
    </table>
</body>
</html>
