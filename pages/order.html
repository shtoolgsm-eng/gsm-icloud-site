<form id="orderForm">

  <label>اختر نوع الجهاز:</label>

    <option value="Apple Watch">Apple Watch</option>
  </select>

  <label>اختر الموديل:</label>

  </select>

  <label>أدخل الرقم التسلسلي (IMEI):</label>
  <input type="text" id="imei" placeholder="IMEI" required>

  <label>المبلغ المطلوب ($):</label>
  <input type="text" id="price" readonly>

  <button type="submit">ادفع واطلب الخدمة</button>
</form>

// تحديث الموديل
document.getElementById("deviceType").addEventListener("change", function(){
  const modelSelect = document.getElementById("model");
  modelSelect.innerHTML = '<option value="">-- اختر الموديل --</option>';

  const selectedDevice = this.value;

  if(products[selectedDevice]){
    products[selectedDevice].forEach(p => {
      const option = document.createElement("option");
      option.value = p.price;
      option.text = p.name + " - $" + p.price;
      modelSelect.add(option);
    });
  }

  document.getElementById("price").value = "";
});

// عرض السعر
document.getElementById("model").addEventListener("change", function(){
  document.getElementById("price").value = this.value;
});

// إرسال الطلب
document.getElementById("orderForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const device = document.getElementById("deviceType").value;
  const modelElement = document.getElementById("model");
  const modelText = modelElement.options[modelElement.selectedIndex]?.text;
  const imei = document.getElementById("imei").value.trim();
  const amount = document.getElementById("price").value;

  if(!name || !email || !device || !modelText || !imei || !amount){
    alert("الرجاء ملء جميع الحقول!");
    return;
  }

      email,
      deviceType: device,
      model: modelText,
      imei,
      price: amount,
      status: "بانتظار الدفع",
      timestamp: serverTimestamp()
    });
