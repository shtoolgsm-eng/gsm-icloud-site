<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب خدمة - GSM SHTOOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #00d2ff;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: #fff;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .order-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { text-align: center; color: var(--primary-blue); margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-family: 'Cairo';
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary-blue); }

        .price-display {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 20px 0;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #3a7bd5, #00d2ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo';
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }

        .back-link { display: block; text-align: center; margin-top: 20px; color: #94a3b8; text-decoration: none; }
    </style>
</head>
<body>

<div class="order-container">
    <h2><i class="fas fa-file-invoice"></i> تقديم طلب جديد</h2>
    
    <form id="orderForm">
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="name" placeholder="أدخل اسمك الثلاثي" required>
        </div>

        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label>نوع الجهاز</label>
            <select id="deviceType" required>
                <option value="">-- اختر النوع --</option>
                <option value="iPhone">iPhone</option>
                <option value="iPad">iPad</option>
                <option value="Apple Watch">Apple Watch</option>
            </select>
        </div>

        <div class="form-group">
            <label>الموديل المحدد</label>
            <select id="model" required>
                <option value="">-- اختر الموديل أولاً --</option>
            </select>
        </div>

        <div class="form-group">
            <label>رقم الـ IMEI (15 رقم)</label>
            <input type="text" id="imei" placeholder="012345678901234" maxlength="15" required>
        </div>

        <div class="price-display" id="priceLabel">المبلغ المطلوب: $0</div>

        <button type="submit" class="btn-submit" id="submitBtn">تأكيد الطلب والانتقال للدفع</button>
    </form>

    <a href="../index.html" class="back-link">العودة للرئيسية</a>
</div>

<script type="module">
    import { db, collection, addDoc, serverTimestamp } from '../firebase-config.js';

    const products = {
        iPhone: [
            {name: "iPhone 6/6s Series", price: 25}, 
          {name: "iPhone SE", price: 30},
            {name: "iPhone 7 Series", price: 30}, 
          {name: "iPhone 8 Series", price: 35},
            {name: "iPhone X", price: 35}, 
          {name: "iPhone XR/XS", price: 40},
            {name: "iPhone XS Max", price: 45}, 
          {name: "iPhone 11", price: 45},
            {name: "iPhone 11 Pro", price: 55}, 
          {name: "iPhone 11 Pro Max", price: 75},
            {name: "iPhone 12 Series", price: 90}, 
          {name: "iPhone 12 Pro Max", price: 100},
            {name: "iPhone 13 Series", price: 115}, 
          {name: "iPhone 13 Pro Max", price: 150},
            {name: "iPhone 14 Series", price: 160}, 
          {name: "iPhone 14 Pro Max", price: 175},
            {name: "iPhone 15 Series", price: 165}, 
          {name: "iPhone 15 Pro Max", price: 190},
            {name: "iPhone 16 Series", price: 190}, 
          {name: "iPhone 16 Pro Max", price: 205},
            {name: "iPhone 17 Series", price: 195}, 
          {name: "iPhone 17 Pro Max", price: 210}
        ],
        iPad: [
            {name: "iPad 8/9", price: 50}, 
          {name: "iPad 10", price: 65},
            {name: "iPad Air 4/5", price: 80}, 
          {name: "iPad Pro 11", price: 140},
            {name: "iPad Pro 12.9", price: 150}
        ],
        "Apple Watch": [
            {name: "Series 4/5", price: 60}, 
          {name: "Series 6/7", price: 65},
            {name: "Series 8/9", price: 70}, 
          {name: "Series 10/11", price: 80},
            {name: "Ultra 1", price: 100}, 
          {name: "Ultra 2/3", price: 120}
        ]
    };

    const deviceSelect = document.getElementById('deviceType');
    const modelSelect = document.getElementById('model');
    const priceLabel = document.getElementById('priceLabel');

    deviceSelect.addEventListener('change', function() {
        modelSelect.innerHTML = '<option value="">-- اختر الموديل --</option>';
        if(this.value) {
            products[this.value].forEach(p => {
                let opt = new Option(`${p.name} ($${p.price})`, p.price);
                modelSelect.add(opt);
            });
        }
        priceLabel.innerText = "المبلغ المطلوب: $0";
    });

    modelSelect.addEventListener('change', function() {
        priceLabel.innerText = `المبلغ المطلوب: $${this.value || 0}`;
    });

    document.getElementById('orderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "جاري الحفظ...";

        const orderData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            device: deviceSelect.value,
            model: modelSelect.options[modelSelect.selectedIndex].text,
            imei: document.getElementById('imei').value,
            price: modelSelect.value,
            status: "pending",
            timestamp: serverTimestamp()
        };

        try {
            const docRef = await addDoc(collection(db, "orders"), orderData);
            // الانتقال لصفحة الدفع مع تمرير المعرف والسعر
            window.location.href = `payment.html?orderId=${docRef.id}&amount=${orderData.price}`;
        } catch (error) {
            console.error(error);
            alert("فشل إرسال الطلب، حاول مرة أخرى.");
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
