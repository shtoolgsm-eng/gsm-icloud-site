<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع حالة الطلب - GSM SHTOOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #00d2ff;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .track-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .search-box {
            position: relative;
            margin: 30px 0;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Cairo';
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus { border-color: var(--primary-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }

        .btn-track {
            background: linear-gradient(45deg, #3a7bd5, #00d2ff);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-family: 'Cairo';
            transition: 0.3s;
        }

        .btn-track:hover { transform: scale(1.02); }

        /* تتبع الحالة (Timeline) */
        .status-container {
            display: none; /* مخفي حتى يتم البحث */
            margin-top: 40px;
            text-align: right;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
        }

        .status-item {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            position: relative;
        }

        .status-icon {
            width: 30px;
            height: 30px;
            background: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            z-index: 2;
        }

        .status-item.active .status-icon { background: var(--primary-blue); box-shadow: 0 0 10px var(--primary-blue); }
        .status-item.active .status-text h4 { color: var(--primary-blue); }

        .status-text h4 { margin: 0; font-size: 1rem; }
        .status-text p { margin: 5px 0 0; font-size: 0.8rem; color: #94a3b8; }

        .back-link { margin-top: 30px; display: block; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="track-card">
    <i class="fas fa-satellite-dish" style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 20px;"></i>
    <h2>تتبع حالة الطلب</h2>
    <p style="color: #94a3b8;">أدخل رقم الطلب (Order ID) لمتابعة التطورات</p>

    <div class="search-box">
        <input type="text" id="orderIdInput" placeholder="مثال: Order-12345">
    </div>

    <button class="btn-track" onclick="trackOrder()">تتبع الآن</button>

    <div id="statusResult" class="status-container">
        <div id="orderInfo" style="margin-bottom: 20px; color: var(--primary-blue); font-weight: bold;"></div>
        
        <div class="status-item" id="step1">
            <div class="status-icon"><i class="fas fa-check"></i></div>
            <div class="status-text">
                <h4>تم استلام الطلب</h4>
                <p>تلقينا بيانات جهازك بنجاح.</p>
            </div>
        </div>

        <div class="status-item" id="step2">
            <div class="status-icon"><i class="fas fa-credit-card"></i></div>
            <div class="status-text">
                <h4>قيد مراجعة الدفع</h4>
                <p>ننتظر تأكيد عملية التحويل من الشبكة.</p>
            </div>
        </div>

        <div class="status-item" id="step3">
            <div class="status-icon"><i class="fas fa-microchip"></i></div>
            <div class="status-text">
                <h4>جاري المعالجة</h4>
                <p>يتم الآن التواصل مع السيرفر لفك القفل.</p>
            </div>
        </div>

        <div class="status-item" id="step4">
            <div class="status-icon"><i class="fas fa-unlocked-alt"></i></div>
            <div class="status-text">
                <h4>اكتملت العملية</h4>
                <p>جهازك الآن مفتوح وجاهز للاستخدام!</p>
            </div>
        </div>
    </div>

    <a href="../index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
</div>

<script type="module">
    import { db, collection } from '../firebase-config.js'; // تأكد من مسار الملف الصحيح
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    window.trackOrder = async function() {
        const orderId = document.getElementById('orderIdInput').value.trim();
        const resultDiv = document.getElementById('statusResult');
        
        if (!orderId) {
            alert("يرجى إدخال رقم الطلب أولاً");
            return;
        }

        try {
            // البحث عن الطلب في Firebase
            const docRef = doc(db, "orders", orderId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                resultDiv.style.display = "block";
                document.getElementById('orderInfo').innerText = `طلب رقم: ${orderId}`;
                
                // تحديث الخط الزمني بناءً على حالة الطلب (status)
                updateTimeline(data.status);
            } else {
                alert("عذراً، رقم الطلب غير موجود في سجلاتنا.");
                resultDiv.style.display = "none";
            }
        } catch (error) {
            console.error("Error:", error);
            alert("حدث خطأ أثناء البحث، تأكد من اتصالك بالإنترنت.");
        }
    }

    function updateTimeline(status) {
        // إعادة تهيئة الألوان
        document.querySelectorAll('.status-item').forEach(item => item.classList.remove('active'));

        // تلوين الخطوات بناءً على الحالة المخزنة في Firebase
        if (status === "pending") {
            document.getElementById('step1').classList.add('active');
        } else if (status === "awaiting_confirmation") {
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.add('active');
        } else if (status === "processing") {
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('step3').classList.add('active');
        } else if (status === "completed") {
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('step3').classList.add('active');
            document.getElementById('step4').classList.add('active');
        }
    }
</script>

</body>
</html>
