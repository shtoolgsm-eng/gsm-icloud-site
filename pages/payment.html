<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع الآمنة - GSM SHTOOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* ... (نفس الستايل الخاص بك مع إضافة بسيطة للزر المعطل) ... */
        :root {
            --primary-blue: #00d2ff;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --btc-orange: #f7931a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: #fff;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .payment-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .timer {
            font-size: 1.5rem; color: #ef4444; font-weight: bold;
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .amount-box {
            background: rgba(255,255,255,0.05); padding: 20px;
            border-radius: 15px; margin-bottom: 25px; border: 1px dashed var(--primary-blue);
        }

        .amount-box h2 { margin: 0; color: var(--primary-blue); font-size: 2rem; }

        #qrcode {
            background: white; padding: 15px; border-radius: 15px;
            display: inline-block; margin-bottom: 25px;
        }

        .address-container {
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px;
            font-size: 0.8rem; word-break: break-all; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;
        }

        .btn-pay {
            width: 100%; padding: 15px;
            background: linear-gradient(45deg, var(--btc-orange), #ffab40);
            color: white; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; font-size: 1.1rem;
            text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }

        .btn-pay:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(247, 147, 26, 0.4); }
        .btn-pay:disabled { background: #475569; cursor: not-allowed; transform: none; }

        .status-msg { margin-top: 20px; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="timer">
        <i class="fas fa-clock"></i>
        <span id="countdown">15:00</span>
    </div>

    <div class="amount-box">
        <p style="margin:0; color:#94a3b8;">المبلغ المطلوب دفعه</p>
        <h2 id="displayAmount">$75</h2>
    </div>

    <div id="qrcode"></div>

    <p style="font-size: 0.8rem; color:#94a3b8; margin-bottom: 10px;">عنوان المحفظة (اضغط للنسخ):</p>
    <div class="address-container" id="btc-addr" onclick="copyAddress()">
        bc1p3w4yfuyu52gdv296nqrs72mfaafkr5qu7xmamflrmql0sqvsmqvhazr9
    </div>

    <button type="button" id="pay-btn" onclick="processOrder()" class="btn-pay">
        <i class="fab fa-bitcoin"></i> فتح المحفظة الآن
    </button>

    <p class="status-msg" id="status-text">
        <i class="fas fa-spinner fa-spin"></i> في انتظار تأكيد الشبكة...
    </p>

    <a href="index.html" style="color:#64748b; text-decoration:none; font-size:0.8rem; display:block; margin-top:20px;">إلغاء العملية والعودة</a>
</div>

<script>
    // --- إعدادات Firebase (ضع بيانات مشروعك هنا) ---
    const firebaseConfig = {
        apiKey: "AIza...",
        authDomain: "gsmshtool.firebaseapp.com",
        projectId: "gsmshtool",
        storageBucket: "gsmshtool.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // إعدادات الدفع
    const btcAddress = "bc1p3w4yfuyu52gdv296nqrs72mfaafkr5qu7xmamflrmql0sqvsmqvhazr9";
    const amount = 75; // المبلغ الثابت أو استخرجه من URL

    // توليد QR Code
    new QRCode(document.getElementById("qrcode"), {
        text: `bitcoin:${btcAddress}?amount=${amount}`,
        width: 180,
        height: 180
    });

    // وظيفة معالجة الطلب عند الضغط على الزر
    async function processOrder() {
        const btn = document.getElementById('pay-btn');
        const statusText = document.getElementById('status-text');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري حفظ الطلب...';

        // 1. توليد رقم طلب فريد
        const orderId = "GSM-" + Math.floor(Math.random() * 900000 + 100000);

        try {
            // 2. حفظ البيانات في Firestore
            await db.collection("orders").doc(orderId).set({
                orderId: orderId,
                amount: amount,
                status: "Pending",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            // 3. فتح المحفظة (رابط خارجي)
            window.open(`bitcoin:${btcAddress}?amount=${amount}`, '_blank');

            // 4. إخبار العميل بالنجاح والتوجيه التلقائي
            statusText.innerHTML = `<span style="color:#10b981">تم إنشاء الطلب: ${orderId} .. جاري تحويلك للتتبع</span>`;
            
            setTimeout(() => {
                window.location.href = `track.html?orderId=${orderId}`;
            }, 3000);

        } catch (error) {
            console.error("Error:", error);
            alert("حدث خطأ في الاتصال بالسيرفر، حاول مجدداً.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fab fa-bitcoin"></i> فتح المحفظة الآن';
        }
    }

    // وظيفة النسخ
    function copyAddress() {
        navigator.clipboard.writeText(btcAddress);
        alert("تم نسخ عنوان المحفظة بنجاح!");
    }

    // العداد التنازلي
    let time = 15 * 60;
    setInterval(() => {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        document.getElementById('countdown').innerHTML = `${minutes}:${seconds < 10 ? '0'+seconds : seconds}`;
        if(time > 0) time--;
    }, 1000);
</script>

</body>
</html>
