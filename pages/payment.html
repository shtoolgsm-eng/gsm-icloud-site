<script>
    // --- إعدادات Firebase النهائية والمؤكدة من مشروعك ---
    const firebaseConfig = {
        apiKey: "AIzaSyDILFJsscE8s2W9iJKiOXBYqzg5Tv1a93E",
        authDomain: "gsm-pro-54d77-e7210.firebaseapp.com",
        databaseURL: "https://gsm-pro-54d77-e7210-default-rtdb.firebaseio.com",
        projectId: "gsm-pro-54d77-e7210",
        storageBucket: "gsm-pro-54d77-e7210.firebasestorage.app",
        messagingSenderId: "386257765697",
        appId: "1:386257765697:web:30cc4397b02fdbe29c8dc0",
        measurementId: "G-HF7NJTF74R"
    };
    
    // تهيئة Firebase (نسخة Compatibility لتعمل مع كود الـ HTML البسيط)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // إعدادات الدفع
    const btcAddress = "bc1p3w4yfuyu52gdv296nqrs72mfaafkr5qu7xmamflrmql0sqvsmqvhazr9";
    const amount = 75; 

    // توليد QR Code
    new QRCode(document.getElementById("qrcode"), {
        text: `bitcoin:${btcAddress}?amount=${amount}`,
        width: 180,
        height: 180
    });

    // وظيفة معالجة الطلب
    async function processOrder() {
        const btn = document.getElementById('pay-btn');
        const statusText = document.getElementById('status-text');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري حفظ الطلب...';

        // توليد رقم طلب فريد
        const orderId = "GSM-" + Math.floor(Math.random() * 900000 + 100000);

        try {
            // حفظ البيانات في Firestore
            await db.collection("orders").doc(orderId).set({
                orderId: orderId,
                amount: amount,
                status: "Pending",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            // فتح رابط المحفظة
            window.open(`bitcoin:${btcAddress}?amount=${amount}`, '_blank');

            // تحديث الواجهة والتوجيه
            statusText.innerHTML = `<span style="color:#10b981">تم إنشاء الطلب: ${orderId} .. جاري تحويلك</span>`;
            
            setTimeout(() => {
                window.location.href = `track.html?orderId=${orderId}`;
            }, 3000);

        } catch (error) {
            console.error("Firebase Error:", error);
            alert("حدث خطأ! تأكد من تفعيل Firestore في لوحة تحكم Firebase واضبط القواعد (Rules) لتسمح بالكتابة.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fab fa-bitcoin"></i> فتح المحفظة الآن';
        }
    }

    function copyAddress() {
        navigator.clipboard.writeText(btcAddress);
        alert("تم نسخ عنوان المحفظة!");
    }

    let time = 15 * 60;
    setInterval(() => {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        document.getElementById('countdown').innerHTML = `${minutes}:${seconds < 10 ? '0'+seconds : seconds}`;
        if(time > 0) time--;
    }, 1000);
</script>
