<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Your Order</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050507; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0f111a; border: 1px solid #1f2235; padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 20px 0; background: #161b22; border: 1px solid #30363d; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #00d2ff; color: black; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 25px; padding: 15px; border-radius: 10px; display: none; background: rgba(0,210,255,0.1); border: 1px solid #00d2ff; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#00d2ff">📦 Track Order</h2>
        <p style="color:#888">Enter your Order ID to check status</p>
        <input type="text" id="orderInput" placeholder="Order ID (e.g., GSM-12345)">
        <button class="btn" onclick="track()">TRACK NOW</button>
        <div id="result"></div>
        <br><a href="index.html" style="color:#555; text-decoration:none; font-size:12px">Return Home</a>
    </div>

    <script>
        function track() {
            const input = document.getElementById('orderInput').value.trim();
            const res = document.getElementById('result');
            const stored = JSON.parse(localStorage.getItem('currentOrder'));

            if (stored && input === stored.id) {
                res.style.display = 'block';
                res.innerHTML = `<strong>Status:</strong> ${stored.status}<br><strong>Device:</strong> ${stored.device}`;
            } else {
                res.style.display = 'block';
                res.style.borderColor = 'red';
                res.innerHTML = '<span style="color:red">Order ID not found!</span>';
            }
        }
    </script>
</body>
</html>
