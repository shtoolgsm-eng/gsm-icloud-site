<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الدفع - GSM SHTOOL</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card glass-card">
            <i class="fab fa-bitcoin" style="font-size: 3rem; color: #f7931a;"></i>
            <h2>تأكيد الطلب والدفع</h2>
            <div id="orderDetails" style="text-align: right; margin: 20px 0; color: white;">
                <p>الخدمة المختارة: <strong id="serviceNameDisplay" style="color: var(--accent);">جاري التحميل...</strong></p>
                <p>المبلغ المطلوب: <span class="price-tag" id="finalPriceDisplay">$0</span></p>
            </div>

            <button id="pay-btn" class="btn btn-premium btn-primary" onclick="processOrder()">إتمام الطلب والدفع</button>

            <div class="delivery-note">
                <i class="fas fa-clock"></i>
                <p>سوف يتم معالجة طلبك والرد خلال <strong>30 ساعة</strong> كحد أقصى.</p>
            </div>
            <div class="info-note">
                <p>ملاحظة هامة: سيتم إرسال إشعار في إيميلك عند اكتمال عملية تحويل حالة جهازك من <strong>ON-و LOST</strong> إلى <strong>OFF</strong>.</p>
            </div>
        </div>
    </div>
    <script src="assets/js/order.js"></script>
    <script>
        // جلب البيانات من الصفحة السابقة
        const selectedPrice = localStorage.getItem('selectedPrice') || "غير معروف";
        const selectedService = localStorage.getItem('selectedServiceName') || "جهاز غير محدد";

        document.getElementById('serviceNameDisplay').innerText = selectedService;
        document.getElementById('finalPriceDisplay').innerText = "$" + selectedPrice;
    </script>
</body>
</html>
