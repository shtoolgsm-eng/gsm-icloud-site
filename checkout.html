<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إتمام الدفع - GSM SHTOOL</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card glass-card">
            <i class="fas fa-wallet" style="font-size: 3rem; color: #007aff;"></i>
            <h2>تأكيد الدفع</h2>
            <p>المبلغ المطلوب: <span class="price-tag">75$ BTC</span></p>

            <button id="pay-btn" class="btn btn-primary" onclick="processOrder()">إرسال الطلب والدفع</button>

            <div class="delivery-note">
                <i class="fas fa-bolt"></i>
                <p>سوف يتم معالجة طلبك والرد خلال <strong>30 ساعة</strong> كحد أقصى.</p>
            </div>

            <div class="info-note">
                <p>ملاحظة: الرد سيكون بإشعار في إيميلك عند تحويل الخدمة من <strong>ON-و LOST</strong> إلى <strong>OFF</strong>.</p>
            </div>
        </div>
    </div>
    <script src="assets/js/order.js"></script>
</body>
</html>
