<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Device Check | SHTOOL GSM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">
    <style>
        :root {
            --premium-gold: #d4af37;
            --soft-gold: #f9e27d;
            --dark-deep: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark-deep);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .vip-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .main-card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border: 1px solid var(--premium-gold);
            border-radius: 24px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .vip-badge {
            color: var(--premium-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, #d4af37, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-wrapper {
            position: relative;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            background: var(--glass-bg);
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--premium-gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .check-btn {
            background: linear-gradient(45deg, var(--premium-gold), var(--soft-gold));
            color: #000;
            padding: 18px 50px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .check-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4);
        }

        /* Instructions Section */
        .guide-section {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .guide-item {
            background: var(--glass-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #222;
            text-align: center;
        }

        .guide-item i {
            color: var(--premium-gold);
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .guide-item img {
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            filter: grayscale(30%);
        }

        #result-display {
            margin-top: 25px;
            font-size: 1.1rem;
            min-height: 50px;
        }

        .loading-spinner {
            color: var(--premium-gold);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="vip-container">
    <div class="main-card">
        <span class="vip-badge">Premium Diagnostic Tool</span>
        <h1>IMEI Intelligence Check</h1>
        
        <div class="input-wrapper">
            <input type="text" id="imeiNumber" placeholder="Enter 15-digit IMEI" maxlength="15">
        </div>
        
        <button class="check-btn" onclick="runDiagnostic()">
            <i class="fas fa-microchip"></i> Analyze Now
        </button>

        <div id="result-display"></div>
    </div>

    <div class="guide-section">
        <div class="guide-item">
            <i class="fas fa-phone"></i>
            <h3>Dial Code</h3>
            <p>Dial <b>*#06#</b> on your phone to instantly reveal your IMEI.</p>
        </div>
        <div class="guide-item">
            <i class="fas fa-gear"></i>
            <h3>Settings</h3>
            <p>Go to <b>Settings > General > About</b> (iOS) or <b>About Phone</b> (Samsung).</p>
        </div>
        <div class="guide-item">
            <i class="fas fa-box"></i>
            <h3>Hardware</h3>
            <p>Check the back of your device or the original retail box.</p>
        </div>
    </div>
</div>

<script>
    async function runDiagnostic() {
        const imei = document.getElementById('imeiNumber').value;
        const display = document.getElementById('result-display');
        
        if(imei.length < 15) {
            display.innerHTML = '<span style="color: #ff4444;">Please enter a valid 15-digit IMEI number.</span>';
            return;
        }

        display.innerHTML = '<i class="fas fa-circle-notch loading-spinner"></i> Accessing Secure Servers...';

        const apiKey = 'a4985612-2f41-466e-b4b9-5fbf1f33e5bf'; // <--- Put your IMEI.info API Key here

        try {
            // Adjust the URL according to IMEI.info's specific API documentation
            const response = await fetch(`https://api.imei.info/v1/check?imei=${imei}&key=${apiKey}`);
            const data = await response.json();

            if(data.success) {
                display.innerHTML = `<div style="color: var(--premium-gold);">MODEL: ${data.model} <br> STATUS: Verified</div>`;
            } else {
                display.innerHTML = `<span style="color: #ff4444;">Error: ${data.message}</span>`;
            }
        } catch (e) {
            display.innerHTML = '<span style="color: #ff4444;">Connection failed. Check your API configuration.</span>';
        }
    }
</script>

</body>
</html>
