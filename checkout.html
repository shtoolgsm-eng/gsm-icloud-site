<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تأكيد الدفع | GSM SHTOOL</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="glass-card checkout-card">
            <div class="logo-icon small">GS</div>
            <h2>تأكيد عملية الدفع</h2>
            <div class="order-summary">
                <p>الجهاز: <span id="disp-name">--</span></p>
                <p>السعر: <span id="disp-price">--</span></p>
            </div>
            
            <div class="wallet-box">
                <i class="fab fa-bitcoin"></i>
                <p>سيتم الدفع عبر عنوان البيتكوين الخاص بالسيرفر</p>
            </div>

            <button id="pay-btn" class="btn-main" onclick="processOrder()">إرسال الطلب وفتح المحفظة</button>
            
            <p class="note">بمجرد الضغط، ستصل بياناتك للفني وسيتم توجيهك للمحفظة.</p>
        </div>
    </div>

    <script src="assets/js/order.js"></script>
    <script>
        document.getElementById('disp-name').innerText = localStorage.getItem('selectedServiceName') || "لم يتم التحديد";
        document.getElementById('disp-price').innerText = "$" + (localStorage.getItem('selectedPrice') || "0");
    </script>
</body>
</html>
