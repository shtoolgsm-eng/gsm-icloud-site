<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSM SHTOOL | تتبع حالتك</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <div class="premium-badge">
                <span class="logo-letters">GS</span>
            </div>
            <h1>تتبع حالة الطلب</h1>
            <p style="color: var(--text-dim);">نظام الاستعلام الذكي عن خدمات Apple</p>
        </div>

        <div class="card">
            <div id="order-info">
                <p id="order-id" style="font-weight: bold; font-size: 1.1rem; color: var(--text-dim); border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
                    جاري التحقق من رقم الطلب...
                </p>
                <div id="status" style="font-size: 1.5rem; font-weight: 800; margin: 20px 0;">
                    <span style="color: var(--accent-color);">انتظار...</span>
                </div>
            </div>
            
            <p style="font-size: 0.9rem; color: var(--text-dim); line-height: 1.4;">
                سيتم تحديث هذه الصفحة تلقائياً فور معالجة طلبك من قبل المهندس المختص.
            </p>
        </div>

        <div style="margin-top: 30px;">
            <a href="../index.html" class="btn" style="background: transparent; border: 1px solid #333; font-size: 0.9rem;">العودة للرئيسية</a>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/tracking.js"></script>
</body>
</html>
