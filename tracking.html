<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Order | GSM SHTOOL VIP</title>
    <style>
        body { background: #050507; color: #fff; font-family: 'Orbitron', sans-serif; text-align: center; padding: 50px; }
        input { padding: 15px; width: 300px; border-radius: 50px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
        .status-box { margin-top: 30px; background: #11131c; padding: 20px; display: inline-block; border-radius: 15px; border: 1px solid #222; }
    </style>
</head>
<body>
    <h1>TRACK YOUR ORDER</h1>
    <input type="text" placeholder="Enter IMEI / Serial Number">
    <br><br>
    <button style="padding:10px 30px; border-radius:50px; background:#00d2ff; border:none; cursor:pointer;" onclick="alert('Order Status: IN PROGRESS (Expected: 24-72h)')">TRACK</button>
    <div class="status-box">
        <p style="font-family: sans-serif; font-size: 13px;">Status: <span style="color:#ffd700">IN REVIEW</span></p>
    </div>
</body>
</html>
