<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing Order</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050507; color: white; text-align: center; padding-top: 15%; }
        .loader { border: 4px solid #161b22; border-top: 4px solid #00d2ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .card { background: #0f111a; border: 1px solid #1f2235; padding: 40px; border-radius: 20px; display: inline-block; }
        .id-box { color: #00d2ff; font-size: 24px; font-weight: bold; margin: 15px 0; letter-spacing: 2px; }
        .btn { background: #161b22; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-size: 14px; border: 1px solid #30363d; }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader"></div>
        <h2>⏳ Order Processing</h2>
        <p>Please save your Order ID:</p>
        <div class="id-box" id="orderIdDisplay">---</div>
        <p style="color:#888">Our team is reviewing your request.</p>
        <br>
        <a href="track.html" class="btn">Go to Tracking Page</a>
    </div>

    <script>
        const stored = JSON.parse(localStorage.getItem('currentOrder'));
        if (stored) {
            document.getElementById('orderIdDisplay').innerText = stored.id;
        }
    </script>
</body>
</html>
